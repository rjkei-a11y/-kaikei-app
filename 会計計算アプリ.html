<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会計計算ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2e;
    --accent: #e8b86d;
    --accent2: #c97b3e;
    --text: #f0eee8;
    --muted: #888899;
    --danger: #e05a5a;
    --success: #5ae07a;
    --border: rgba(232,184,109,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 40px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(232,184,109,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,123,62,0.05) 0%, transparent 50%);
  }

  header { text-align: center; margin-bottom: 28px; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    line-height: 1;
  }
  header p { color: var(--muted); font-size: 0.78rem; letter-spacing: 0.1em; margin-top: 4px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 700;
  }

  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .type-btn .label { font-size: 0.82rem; font-weight: 700; display: block; }
  .type-btn .price { font-size: 0.7rem; color: var(--muted); margin-top: 2px; display: block; }
  .type-btn.selected { background: rgba(232,184,109,0.15); border-color: var(--accent); color: var(--accent); }
  .type-btn.selected .price { color: var(--accent2); }

  .input-row { display: flex; align-items: center; gap: 10px; }
  .input-row label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

  input[type="number"] {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--accent); }

  .order-list { display: flex; flex-direction: column; gap: 10px; }
  .order-item { display: flex; align-items: center; gap: 8px; }
  .order-num {
    font-size: 0.7rem;
    color: var(--accent);
    font-weight: 900;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.05em;
    min-width: 22px;
  }
  .order-input { flex: 1; min-width: 0; }
  .taxxed-display {
    font-size: 0.68rem;
    color: var(--accent2);
    text-align: right;
    white-space: nowrap;
    min-width: 80px;
  }

  .total-card {
    background: linear-gradient(135deg, rgba(232,184,109,0.12), rgba(201,123,62,0.08));
    border: 1.5px solid var(--accent);
  }
  .total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .total-row .total-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; }
  .total-row .total-val { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .total-row.big .total-val {
    font-size: 1.5rem; color: var(--accent);
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em;
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  .remain-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    margin-bottom: 16px;
    text-align: center;
  }
  .remain-label { font-size: 0.7rem; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .remain-amount { font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; letter-spacing: 0.04em; line-height: 1; transition: color 0.3s; }
  .remain-amount.positive { color: var(--success); }
  .remain-amount.negative { color: var(--danger); }
  .remain-amount.zero { color: var(--muted); }
  .remain-sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

  .addorder-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
    text-align: center;
  }
  .addorder-label { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .addorder-amount { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; color: var(--success); letter-spacing: 0.04em; }
  .addorder-sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .addorder-card.over .addorder-amount { color: var(--danger); }
  .addorder-card.over .addorder-sub { color: var(--danger); }

  .reset-btn {
    width: 100%; background: transparent; border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--muted); padding: 12px;
    font-size: 0.8rem; font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:active { background: rgba(255,255,255,0.04); }

  .tax-note {
    text-align: center; font-size: 0.68rem; color: var(--muted);
    margin-top: -10px; margin-bottom: 14px; letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<header>
  <h1>会計計算ツール</h1>
  <p>CASHIER ASSISTANT APP</p>
</header>

<!-- 入店種別 -->
<div class="card">
  <div class="card-title">① 入店種別</div>
  <div class="type-grid">
    <button class="type-btn" data-price="11535" onclick="selectType(this)">
      <span class="label">1時間</span><span class="price">¥11,535</span>
    </button>
    <button class="type-btn" data-price="16056" onclick="selectType(this)">
      <span class="label">2時間</span><span class="price">¥16,056</span>
    </button>
    <button class="type-btn" data-price="20577" onclick="selectType(this)">
      <span class="label">フリータイム</span><span class="price">¥20,577</span>
    </button>
    <button class="type-btn" data-price="31126" onclick="selectType(this)">
      <span class="label">VIP通常</span><span class="price">¥31,126</span>
    </button>
    <button class="type-btn" style="grid-column:span 2;" data-price="35647" onclick="selectType(this)">
      <span class="label">VIP特殊</span><span class="price">¥35,647</span>
    </button>
  </div>
</div>

<!-- 予算 -->
<div class="card">
  <div class="card-title">② お客様予算</div>
  <div class="input-row">
    <label>予算 ¥</label>
    <input type="number" id="budget" placeholder="例: 50000" oninput="calc()">
  </div>
</div>

<!-- 注文 -->
<div class="card">
  <div class="card-title">③ 現在の注文（小計）</div>
  <div class="order-list">
    <div class="order-item">
      <span class="order-num">01</span>
      <input type="number" class="order-input" id="o1" placeholder="¥0" oninput="calc()">
      <span class="taxxed-display" id="t1"></span>
    </div>
    <div class="order-item">
      <span class="order-num">02</span>
      <input type="number" class="order-input" id="o2" placeholder="¥0" oninput="calc()">
      <span class="taxxed-display" id="t2"></span>
    </div>
    <div class="order-item">
      <span class="order-num">03</span>
      <input type="number" class="order-input" id="o3" placeholder="¥0" oninput="calc()">
      <span class="taxxed-display" id="t3"></span>
    </div>
    <div class="order-item">
      <span class="order-num">04</span>
      <input type="number" class="order-input" id="o4" placeholder="¥0" oninput="calc()">
      <span class="taxxed-display" id="t4"></span>
    </div>
    <div class="order-item">
      <span class="order-num">05</span>
      <input type="number" class="order-input" id="o5" placeholder="¥0" oninput="calc()">
      <span class="taxxed-display" id="t5"></span>
    </div>
  </div>
</div>

<!-- 合計 -->
<div class="card total-card">
  <div class="card-title">④ 現在の合計</div>
  <div class="total-row">
    <span class="total-label">スタート料金</span>
    <span class="total-val" id="dispStart">—</span>
  </div>
  <div class="total-row">
    <span class="total-label">注文小計</span>
    <span class="total-val" id="dispOrder">¥0</span>
  </div>
  <div class="total-row">
    <span class="total-label">注文小計への税・諸費用（×1.507）</span>
    <span class="total-val" id="dispTax">—</span>
  </div>
  <hr class="divider">
  <div class="total-row big">
    <span class="total-label">現在の合計金額</span>
    <span class="total-val" id="dispTotal">—</span>
  </div>
  <hr class="divider">
  <div class="total-row big" style="background:rgba(232,184,109,0.08);border-radius:10px;padding:10px 12px;margin-top:4px;">
    <span class="total-label" style="color:var(--accent);font-weight:700;letter-spacing:0.1em;">お支払い額（1,000円単位）</span>
    <span class="total-val" id="dispRounded" style="font-size:2rem;color:var(--accent);">—</span>
  </div>
</div>

<p class="tax-note">合計 ＝ スタート料金 ＋ 注文小計 × 1.507</p>

<!-- 残額 -->
<div class="remain-card">
  <div class="remain-label">お客様の残り予算</div>
  <div class="remain-amount zero" id="remainAmount">—</div>
  <div class="remain-sub" id="remainSub">入店種別と予算を入力してください</div>
</div>

<!-- 追加注文可能額 -->
<div class="addorder-card" id="addOrderCard">
  <div class="addorder-label">あと追加注文できる小計金額</div>
  <div class="addorder-amount" id="addOrderAmount">—</div>
  <div class="addorder-sub" id="addOrderSub">500円単位（税・諸費用込みの残額から逆算）</div>
</div>

<button class="reset-btn" onclick="resetAll()">↺ リセット</button>

<script>
  const TAX = 1.507;
  const STEP = 500;
  let startPrice = 0;

  function selectType(btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    startPrice = parseInt(btn.dataset.price);
    calc();
  }

  function fmt(n) {
    return '¥' + Math.round(n).toLocaleString('ja-JP');
  }

  function calc() {
    const budget = parseInt(document.getElementById('budget').value) || 0;

    let orderSum = 0;
    for (let i = 1; i <= 5; i++) {
      const v = parseInt(document.getElementById('o' + i).value) || 0;
      orderSum += v;
      document.getElementById('t' + i).textContent = v > 0 ? '税込' + fmt(v * TAX) : '';
    }

    document.getElementById('dispStart').textContent = startPrice ? fmt(startPrice) : '—';
    document.getElementById('dispOrder').textContent = fmt(orderSum);

    if (!startPrice) {
      document.getElementById('dispTax').textContent = '—';
      document.getElementById('dispTotal').textContent = '—';
      document.getElementById('dispRounded').textContent = '—';
      setRemain(null, null);
      return;
    }

    const orderWithTax = orderSum * TAX;
    const tax = orderWithTax - orderSum;
    const total = startPrice + orderWithTax;

    document.getElementById('dispTax').textContent = '+' + fmt(tax);
    document.getElementById('dispTotal').textContent = fmt(total);

    const rem = total % 1000;
    const roundedTotal = rem >= 500 ? Math.ceil(total / 1000) * 1000 : Math.floor(total / 1000) * 1000;
    document.getElementById('dispRounded').textContent = fmt(roundedTotal);

    if (!budget) { setRemain(null, null); return; }

    const remain = budget - roundedTotal;
    const remainForAdd = budget - total;
    setRemain(remain, remainForAdd);
  }

  function setRemain(remain, remainForAdd) {
    const el = document.getElementById('remainAmount');
    const sub = document.getElementById('remainSub');
    const addCard = document.getElementById('addOrderCard');
    const addAmt = document.getElementById('addOrderAmount');
    const addSub = document.getElementById('addOrderSub');

    if (remain === null) {
      el.textContent = '—'; el.className = 'remain-amount zero';
      sub.textContent = '入店種別と予算を入力してください';
      addAmt.textContent = '—';
      addCard.className = 'addorder-card';
      addSub.textContent = '500円単位（税・諸費用込みの残額から逆算）';
      return;
    }

    el.textContent = fmt(remain);
    if (remain > 0) { el.className = 'remain-amount positive'; sub.textContent = '予算内です'; }
    else if (remain < 0) { el.className = 'remain-amount negative'; sub.textContent = '⚠️ 予算超過しています'; }
    else { el.className = 'remain-amount zero'; sub.textContent = 'ちょうどです'; }

    if (remainForAdd > 0) {
      const addable = Math.floor((remainForAdd / TAX) / STEP) * STEP;
      addCard.className = 'addorder-card';
      if (addable > 0) {
        addAmt.textContent = fmt(addable);
        addSub.textContent = '小計 ' + fmt(addable) + ' 追加すると税込 ' + fmt(addable * TAX) + ' かかります';
      } else {
        addAmt.textContent = '¥0';
        addSub.textContent = '追加注文の余裕がありません（500円未満）';
      }
    } else {
      addCard.className = 'addorder-card over';
      addAmt.textContent = '超過中';
      addSub.textContent = '予算を超えています';
    }
  }

  function resetAll() {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    startPrice = 0;
    document.getElementById('budget').value = '';
    for (let i = 1; i <= 5; i++) {
      document.getElementById('o' + i).value = '';
      document.getElementById('t' + i).textContent = '';
    }
    calc();
  }
</script>
</body>
</html>
